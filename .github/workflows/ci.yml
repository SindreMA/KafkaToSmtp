name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'providers.example.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: registry.k8s.sindrema.com
  IMAGE_NAME: images/kafka-to-smtp
  K8S_REPO: SindreMA/sindre-k8s
  K8S_DEPLOYMENT_PATH: manifests/communication/email-worker-deployment.yaml

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.timestamp.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Generate timestamp tag
        id: timestamp
        run: echo "tag=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.timestamp.outputs.tag }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout k8s manifests repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.K8S_REPO }}
          path: k8s-repo
          token: ${{ secrets.GH_PAT }}

      - name: Update Kubernetes deployment
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"

          echo "Updating deployment to use image tag: ${IMAGE_TAG}"
          echo "Deployment file: ${K8S_DEPLOYMENT_PATH}"

          echo "Before update:"
          cat "k8s-repo/${K8S_DEPLOYMENT_PATH}" | grep "image:" || echo "No image line found"

          sed -i.bak "s|image: ${REGISTRY}/${IMAGE_NAME}[^[:space:]]*|image: ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}|g" \
            "k8s-repo/${K8S_DEPLOYMENT_PATH}"

          echo "After update:"
          cat "k8s-repo/${K8S_DEPLOYMENT_PATH}" | grep "image:"

          if ! diff -q "k8s-repo/${K8S_DEPLOYMENT_PATH}.bak" "k8s-repo/${K8S_DEPLOYMENT_PATH}" > /dev/null 2>&1; then
            echo "File was successfully updated"
          else
            echo "Warning: File did not change!"
            exit 1
          fi
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          K8S_DEPLOYMENT_PATH: ${{ env.K8S_DEPLOYMENT_PATH }}

      - name: Commit and push deployment update
        run: |
          cd k8s-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"

          git add "${K8S_DEPLOYMENT_PATH}"

          if git diff --cached --quiet; then
            echo "No changes detected; deployment already at the correct version."
            cat "${K8S_DEPLOYMENT_PATH}" | grep "image:"
          else
            git commit -m "Update kafka-to-smtp deployment to image tag ${IMAGE_TAG}"
            git push
            echo "Successfully pushed deployment update!"
          fi
        env:
          K8S_DEPLOYMENT_PATH: ${{ env.K8S_DEPLOYMENT_PATH }}
